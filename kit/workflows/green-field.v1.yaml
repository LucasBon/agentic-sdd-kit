id: green-field
version: 1.0.0
title: Workflow green-field (producto + DDD liviano)
description: Secuencia de artefactos mínimos para iniciar un producto desde cero con handoff explícito entre etapas.

steps:
  - id: project-brief
    title: Brief del proyecto
    objective: Fijar problema, usuarios, restricciones, stakeholders y riesgos iniciales sin solución técnica.
    preconditions: []
    primary_template: kit/templates/id2s/01-project-brief.md.template
    outputs:
      - path: docs/id2s/01-project-brief.md
        template: kit/templates/id2s/01-project-brief.md.template
    doc_skill: id2s-doc-project-brief
    primary_role_skill: id2s-role-product-manager
    completion_criteria:
      - El problema y el usuario principal están definidos en una o dos frases verificables.
      - Hay al menos 3 restricciones o supuestos explícitos (negocio, compliance, tiempo, presupuesto o políticas).
      - Stakeholders y sus intereses están listados (aunque sea provisionalmente).
      - La sección Handoff pack está completa con entradas concretas para visión y alcance.

  - id: vision-scope
    title: Visión y alcance
    objective: Alinear resultado deseado, métricas de éxito, no-objetivos y supuestos de producto.
    preconditions:
      - type: file_exists
        path: docs/id2s/01-project-brief.md
        description: Debe existir el brief para anclar visión y alcance.
    primary_template: kit/templates/id2s/02-vision-and-scope.md.template
    outputs:
      - path: docs/id2s/02-vision-and-scope.md
        template: kit/templates/id2s/02-vision-and-scope.md.template
    doc_skill: id2s-doc-vision-scope
    primary_role_skill: id2s-role-product-manager
    completion_criteria:
      - Objetivos de negocio y métricas de éxito están priorizados (top 3).
      - No-objetivos explícitos evitan deriva de alcance.
      - Supuestos y riesgos de producto están visibles y son revisables.
      - Handoff pack conecta con capacidades priorizadas.

  - id: capability-discovery
    title: Descubrimiento de capacidades
    objective: Traducir visión en capacidades priorizadas y journeys mínimos para guiar diseño y entrega.
    preconditions:
      - type: file_exists
        path: docs/id2s/02-vision-and-scope.md
        description: Visión y alcance acordados por escrito.
    primary_template: kit/templates/id2s/03-capability-discovery.md.template
    outputs:
      - path: docs/id2s/03-capability-discovery.md
        template: kit/templates/id2s/03-capability-discovery.md.template
    doc_skill: id2s-doc-capability-discovery
    primary_role_skill: id2s-role-business-analyst
    completion_criteria:
      - Capacidades priorizadas (P0/P1) con valor esperado cada una.
      - Al menos un journey end-to-end por capacidad P0.
      - Dependencias externas o integraciones candidatas identificadas.
      - Handoff pack lista conceptos candidatos al modelo de dominio.

  - id: domain-model
    title: Modelo de dominio (estrategia liviana)
    objective: Estabilizar lenguaje ubicuo, bounded contexts candidatos y relaciones sin diseño táctico exhaustivo.
    preconditions:
      - type: file_exists
        path: docs/id2s/03-capability-discovery.md
        description: Capacidades y journeys como insumo de modelado.
    primary_template: kit/templates/id2s/04-domain-model.md.template
    outputs:
      - path: docs/id2s/04-domain-model.md
        template: kit/templates/id2s/04-domain-model.md.template
    doc_skill: id2s-doc-domain-model
    primary_role_skill: id2s-role-business-analyst
    completion_criteria:
      - Glosario con términos de negocio y definiciones sin ambigüedad crítica.
      - Contextos delimitados candidatos con responsabilidad en una frase cada uno.
      - Mapa de contexto lite (relaciones principales) o lista de integraciones contexto-a-contexto.
      - Decisiones pendientes explícitas para requisitos y arquitectura.

  - id: requirements
    title: Requisitos ejecutables-lite
    objective: FR/NFR priorizados, reglas de negocio citables y criterios de aceptación alineados a capacidades.
    preconditions:
      - type: file_exists
        path: docs/id2s/04-domain-model.md
        description: Modelo de dominio liviano como fuente de términos y límites.
    primary_template: kit/templates/id2s/05-requirements.md.template
    outputs:
      - path: docs/id2s/05-requirements.md
        template: kit/templates/id2s/05-requirements.md.template
    doc_skill: id2s-doc-requirements
    primary_role_skill: id2s-role-business-analyst
    completion_criteria:
      - Requisitos funcionales priorizados con identificador estable (FR-xxx).
      - NFRs críticos (seguridad, rendimiento, disponibilidad, observabilidad) listados con umbral o método de verificación.
      - Reglas de negocio referencian términos del glosario.
      - Criterios de aceptación testeables por capability P0.

  - id: architecture-adrs
    title: Arquitectura y ADRs
    objective: Decidir estructura del sistema (C4 contexto/contenedor), interfaces externas e índice de ADRs.
    preconditions:
      - type: file_exists
        path: docs/id2s/05-requirements.md
        description: Requisitos priorizados para fundamentar decisiones arquitectónicas.
    primary_template: kit/templates/id2s/06-architecture-adrs.md.template
    outputs:
      - path: docs/id2s/06-architecture-adrs.md
        template: kit/templates/id2s/06-architecture-adrs.md.template
    doc_skill: id2s-doc-architecture-adrs
    primary_role_skill: id2s-role-architect
    completion_criteria:
      - Diagrama o descripción C4 nivel sistema y contenedores con responsabilidades.
      - Lista de integraciones externas con propósito y dueño técnico/nombre de servicio.
      - ADRs propuestos con estado (propuesto/aceptado) y consecuencias resumidas.
      - Handoff pack prepara implementación (módulos, riesgos técnicos, pruebas de humo).
