id: system-design
version: 1.0.0
title: System design
objective: C4 views, integrations, ADRs, and technical handoff from business requirements.

primary_role_skill: ask-role-architect
doc_skill: ask-doc-system-design

inputs:
  - kind: artifact
    path: docs/ask/business-requirements.md
    required: true
    description: Business requirements as input.

outputs:
  - path: docs/ask/system-design.md
    template: kit/templates/ask/system-design.md.template

completion_criteria:
  - Context and container views with responsibilities.
  - External integrations and contracts at a high level.
  - ADRs indexed with status and consequences.
  - Handoff pack lists modules, APIs, data, and smoke tests.
