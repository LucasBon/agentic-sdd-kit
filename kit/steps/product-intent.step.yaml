id: product-intent
version: 1.0.0
title: Product intent
objective: Capture problem, users, outcome, metrics, non-goals, and constraints without a technical solution.

primary_role_skill: ask-role-product-manager
doc_skill: ask-doc-product-intent

inputs: []

outputs:
  - path: docs/ask/product-intent.md
    template: kit/templates/ask/product-intent.md.template

completion_criteria:
  - Problem and primary user are defined in one or two verifiable sentences.
  - At least 3 explicit constraints or assumptions.
  - Top 3 business objectives and success metrics are prioritized.
  - Explicit non-goals prevent scope drift.
  - Handoff pack is concrete for business-requirements.
