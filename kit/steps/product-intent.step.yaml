id: product-intent
version: 1.0.0
title: Intención de producto
objective: Fijar problema, usuarios, outcome, métricas, no-objetivos y restricciones sin solución técnica.

primary_role_skill: id2s-role-product-manager
doc_skill: id2s-doc-product-intent

inputs: []

outputs:
  - path: docs/id2s/product-intent.md
    template: kit/templates/id2s/product-intent.md.template
    agent_ready_path: agent-ready-docs/id2s/product-intent.agent.yaml

suggested_role_skills:
  - id2s-role-project-leader
  - id2s-role-business-analyst

completion_criteria:
  - El problema y el usuario principal están definidos en una o dos frases verificables.
  - Hay al menos 3 restricciones o supuestos explícitos.
  - Objetivos de negocio y métricas de éxito top 3 están priorizados.
  - No-objetivos explícitos evitan deriva de alcance.
  - Handoff pack concreto para business-requirements.
