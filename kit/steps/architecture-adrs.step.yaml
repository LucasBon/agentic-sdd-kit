id: architecture-adrs
version: 1.0.0
title: Architecture and ADRs
objective: Decide system structure (C4 context/container), external interfaces, and ADR index.

primary_role_skill: id2s-role-architect
doc_skill: id2s-doc-architecture-adrs

inputs:
  - kind: artifact
    path: docs/id2s/05-requirements.md
    required: true
    description: Prioritized requirements to ground architectural decisions.

outputs:
  - path: docs/id2s/06-architecture-adrs.md
    template: kit/templates/id2s/06-architecture-adrs.md.template

completion_criteria:
  - C4 system and container level diagram or description with responsibilities.
  - External integrations list with purpose and technical owner or service name.
  - Proposed ADRs with status (proposed/accepted) and summarized consequences.
  - Handoff pack prepares implementation (modules, technical risks, smoke tests).
