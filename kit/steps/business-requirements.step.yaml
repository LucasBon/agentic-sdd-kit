id: business-requirements
version: 1.0.0
title: Business requirements
objective: Formalize rules, business FR/NFR, minimal glossary, and verifiable criteria anchored to product intent.

primary_role_skill: id2s-role-business-analyst
doc_skill: id2s-doc-business-requirements

inputs:
  - kind: artifact
    path: docs/id2s/product-intent.md
    required: true
    description: Agreed product intent as input.

outputs:
  - path: docs/id2s/business-requirements.md
    template: kit/templates/id2s/business-requirements.md.template

completion_criteria:
  - Problem and scope referenced without contradicting product-intent.
  - FR-xxx with testable acceptance criteria per P0 capability.
  - BR-xxx with glossary terms defined.
  - P0/P1 capabilities listed with expected value.
  - Handoff pack ready for system-design.
