id: capability-discovery
version: 1.0.0
title: Capability discovery
objective: Translate vision into prioritized capabilities and minimal journeys for design and delivery.

primary_role_skill: ask-role-business-analyst
doc_skill: ask-doc-capability-discovery

inputs:
  - kind: artifact
    path: docs/ask/02-vision-and-scope.md
    required: true
    description: Vision and scope agreed in writing.

outputs:
  - path: docs/ask/03-capability-discovery.md
    template: kit/templates/ask/03-capability-discovery.md.template

completion_criteria:
  - Capabilities prioritized (P0/P1) with expected value each.
  - At least one end-to-end journey per P0 capability.
  - External dependencies or candidate integrations identified.
  - Handoff pack lists candidate concepts for domain modeling.
